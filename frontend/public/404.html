<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var path = String(window.location.pathname || "");
        var normalizedPath = path.replace(/\/+$/, "");
        var segments = normalizedPath.split("/").filter(Boolean);
        var base = "/";
        if (segments.length > 0) {
          base = "/" + segments[0] + "/";
        }

        var tail = segments.slice(1).join("/").toLowerCase();
        if (tail === "user") {
          window.location.replace(base + "?ui=user");
          return;
        }
        if (tail === "admin") {
          window.location.replace(base + "?ui=admin");
          return;
        }

        window.location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
